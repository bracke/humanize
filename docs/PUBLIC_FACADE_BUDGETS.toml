# Public facade navigation and growth budgets.
# target_lines records the reviewed ratchet baseline and is enforced so root
# compatibility facades cannot grow accidentally. max_lines is the hard release
# gate for deliberate compatibility expansion. min_headroom_lines keeps reviewed
# targets away from the hard cap, so future API families move to child packages
# or root-only APIs migrate behind child facades before these specs fill up.

[[facade]]
unit = "Humanize.Parsing"
path = "src/humanize-parsing.ads"
target_lines = 3282
max_lines = 3450
min_headroom_lines = 120
max_bytes = 130000
child_prefix = "Humanize.Parsing."
min_child_units = 8
map_marker = "Facade map:"
child_unit_count = 8
child_units = "Humanize.Parsing.Results|Humanize.Parsing.Colors|Humanize.Parsing.Date_Times|Humanize.Parsing.Domain_Labels|Humanize.Parsing.Durations|Humanize.Parsing.Numbers|Humanize.Parsing.Strings|Humanize.Parsing.Units"
section_marker_count = 8
section_markers = "Facade section: shared result and diagnostic types.|Facade section: normalization and parse diagnostics.|Facade section: duration, date, and scheduling parsers.|Facade section: numeric and comparison parsers.|Facade section: color parsers.|Facade section: phrase, field, and collection parsers.|Facade section: text and string parsers.|Facade section: unit, rate, and measurement parsers."
usecase = "Root parser compatibility facade; new parser families should prefer child parsing packages."

