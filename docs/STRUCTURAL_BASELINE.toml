# Structural baseline for large implementation and support units.
# The policy checker validates line ratchets, hard line/byte limits, and split
# inventories so large compatibility backends, generated/native data, and
# support specs do not silently grow back into unbounded monoliths. target_lines
# records the reviewed baseline; max_lines is the hard growth gate;
# min_headroom_lines keeps targets away from hard caps. Use min_split_bodies = 0
# for large units without subunits.

