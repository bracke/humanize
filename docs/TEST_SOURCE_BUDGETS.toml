# Per-suite test source size budgets.
# The checker applies the longest matching prefix, so focused suite entries can
# deliberately allow large generated-locale or compatibility corpus subunits
# while ordinary test files stay under tighter defaults.

[[suite]]
prefix = "tests/src/humanize-tests-"
parent_max_lines = 900
subunit_max_lines = 850
usecase = "Default budget for ordinary Humanize AUnit suite bodies; architecture is the largest unsplit parent."

[[suite]]
prefix = "tests/src/humanize-tests-compatibility"
parent_max_lines = 500
subunit_max_lines = 550
usecase = "Compatibility corpus subunits are split by round-trip family."

[[suite]]
prefix = "tests/src/humanize-tests-domain_gaps"
parent_max_lines = 450
subunit_max_lines = 620
usecase = "Domain gap tests are split by product/data/cross-domain feature area."

[[suite]]
prefix = "tests/src/humanize-tests-durations"
parent_max_lines = 300
subunit_max_lines = 720
usecase = "Duration tests keep compact, clock, schedule, natural-distance, and workflow-style checks in focused subunits."

[[suite]]
prefix = "tests/src/humanize-tests-numbers"
parent_max_lines = 750
subunit_max_lines = 810
usecase = "Number tests keep spellout/cardinal and bounded checks in focused subunits; cardinal/fractional stays close to its ratchet."

[[suite]]
prefix = "tests/src/humanize-tests-parsing"
parent_max_lines = 500
subunit_max_lines = 925
usecase = "Parser coverage is split into focused parser-family and corpus subunits; frequency/rate/list stays close to its ratchet."

[[suite]]
prefix = "tests/src/humanize-tests-rendering"
parent_max_lines = 450
subunit_max_lines = 775
usecase = "Rendering tests allow generated-locale and style-preset subunits; style presets stay close to their ratchet."

[[suite]]
prefix = "tests/src/humanize-tests-strings"
parent_max_lines = 500
subunit_max_lines = 470
usecase = "String helper coverage is split into focused text, path, Unicode, and terminal subunits."

[[suite]]
prefix = "tests/src/locale_audit"
parent_max_lines = 1000
subunit_max_lines = 1000
usecase = "Locale audit is a standalone integration-style source outside the AUnit suite prefix and stays close to its ratchet."

[[suite]]
prefix = "tests/src/perf_smoke"
parent_max_lines = 460
subunit_max_lines = 460
usecase = "Performance smoke is a standalone executable with representative release paths, including parser, phrase, string, list, and domain helpers."

[[suite]]
prefix = "tests/src/perf_baseline_report"
parent_max_lines = 260
subunit_max_lines = 260
usecase = "Performance baseline reporting is a small standalone maintenance executable."

[[suite]]
prefix = "tests/src/"
parent_max_lines = 80
subunit_max_lines = 80
usecase = "Standalone test runners and suite registries must stay tiny."
