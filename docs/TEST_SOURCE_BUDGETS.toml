# Per-suite test source size budgets.
# The checker applies the longest matching prefix, so focused suite entries can
# deliberately allow large generated-locale or compatibility corpus subunits
# while ordinary test files stay under tighter defaults.

[[suite]]
prefix = "tests/src/humanize-tests-"
parent_max_lines = 1000
subunit_max_lines = 1000
usecase = "Default budget for ordinary Humanize AUnit suite bodies."

[[suite]]
prefix = "tests/src/humanize-tests-compatibility"
parent_max_lines = 500
subunit_max_lines = 600
usecase = "Compatibility corpus subunits are split by round-trip family."

[[suite]]
prefix = "tests/src/humanize-tests-domain_gaps"
parent_max_lines = 450
subunit_max_lines = 650
usecase = "Domain gap tests are split by product/data/cross-domain feature area."

[[suite]]
prefix = "tests/src/humanize-tests-durations"
parent_max_lines = 500
subunit_max_lines = 1200
usecase = "Duration tests keep compact, clock, and workflow-style checks in focused subunits."

[[suite]]
prefix = "tests/src/humanize-tests-numbers"
parent_max_lines = 800
subunit_max_lines = 900
usecase = "Number tests keep spellout/cardinal and bounded checks in focused subunits."

[[suite]]
prefix = "tests/src/humanize-tests-parsing"
parent_max_lines = 800
subunit_max_lines = 1500
usecase = "Parser coverage is split into focused parser-family and corpus subunits."

[[suite]]
prefix = "tests/src/humanize-tests-rendering"
parent_max_lines = 600
subunit_max_lines = 900
usecase = "Rendering tests allow generated-locale and style-preset subunits."

[[suite]]
prefix = "tests/src/humanize-tests-strings"
parent_max_lines = 500
subunit_max_lines = 500
usecase = "String helper coverage is split into focused text, path, Unicode, and terminal subunits."
