Humanize_Diagnostics = "Humanize.Diagnostics.Issue_Summary_Label"
Humanize_Domain_Details = "Humanize.Domain_Details.Parse_Metadata_Summary_Label"
Humanize_Durations = "Humanize.Durations.Format"
Humanize_Numbers = "Humanize.Numbers.Compact"
Humanize_Numbers_Editorial = "Humanize.Numbers.Editorial.Editorial_Number"
Humanize_Numbers_Ranges = "Humanize.Numbers.Ranges.Between"
Humanize_Numbers_Scales = "Humanize.Numbers.Scales.SI_Prefix"
Humanize_Numbers_Spellout = "Humanize.Numbers.Spellout.Ordinal_Words"
