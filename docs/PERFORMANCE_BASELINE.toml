[perf_smoke.area_coverage]
root = "exempt: root facade has no standalone runtime path"
core = "Humanize.Capabilities.Capability_Matrix_Summary"
formatting = "Humanize.Bytes.Format"
parsing = "Humanize.Parsing.Parse_Bytes"
phrases = "Humanize.Phrases.Status_Phrase"
domain = "Humanize.System_Status.HTTP_Status_Label"
