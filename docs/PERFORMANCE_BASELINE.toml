# Loose performance smoke baseline for common Humanize paths.
# This is intentionally not a benchmark suite; it catches pathological
# slowdowns while remaining stable across normal developer machines.

[perf_smoke]
executable = "tests/src/perf_smoke.adb"
iterations = 2000
max_seconds = 30.0
paths = [
  "Humanize.Bytes.Format",
  "Humanize.Durations.Format",
  "Humanize.Numbers.Compact",
  "Humanize.Numbers.Editorial.Editorial_Number",
  "Humanize.Numbers.Ranges.Between",
  "Humanize.Numbers.Scales.SI_Prefix",
  "Humanize.Numbers.Spellout.Ordinal_Words",
  "Humanize.Numbers.Statistics.Outlier_Summary_Label",
  "Humanize.Datetimes.Relative",
  "Humanize.Colors.Contrast.Contrast_Label",
  "Humanize.Parsing.Parse_Bytes",
  "Humanize.Parsing.Parse_Duration",
  "Humanize.Parsing.Parse_Cardinal",
  "Humanize.Parsing.Parse_RGB_Label",
  "Humanize.Strings.Title_Case_Smart",
  "Humanize.Strings.Core.Title_Case_Smart",
  "Humanize.Strings.Truncate_Words",
  "Humanize.Strings.Display.Truncate_Display_Width",
  "Humanize.Colors.CSS.CSS_Color_Label",
  "Humanize.System_Status.HTTP_Status_Label",
  "Humanize.Operations.Progress_Summary",
  "Humanize.Diagnostics.Issue_Summary_Label",
  "Humanize.Search.Search_Result_Summary_Label",
  "Humanize.Capabilities.Capability_Matrix_Summary",
  "Humanize.Phrases.Status_Phrase",
  "Humanize.Phrases.Fields.Field_Change_Summary",
  "Humanize.Phrases.Keys.Status_Key",
  "Humanize.Phrases.Severity.Severity_Label",
  "Humanize.Phrases.Summaries.Queue_Summary",
  "Humanize.Builds.Build_Label",
  "Humanize.Permissions.Permission_Label",
  "Humanize.Domain_Details.Parse_Metadata_Summary_Label"
]

[perf_smoke.formatting]
iterations = 2000
max_seconds = 12.0
paths = [
  "Humanize.Bytes.Format",
  "Humanize.Durations.Format",
  "Humanize.Numbers.Compact",
  "Humanize.Numbers.Editorial.Editorial_Number",
  "Humanize.Numbers.Ranges.Between",
  "Humanize.Numbers.Scales.SI_Prefix",
  "Humanize.Numbers.Spellout.Ordinal_Words",
  "Humanize.Numbers.Statistics.Outlier_Summary_Label",
  "Humanize.Datetimes.Relative",
  "Humanize.Colors.Contrast.Contrast_Label"
]

[perf_smoke.parsing]
iterations = 2000
max_seconds = 18.0
paths = [
  "Humanize.Parsing.Parse_Bytes",
  "Humanize.Parsing.Parse_Duration",
  "Humanize.Parsing.Parse_Cardinal",
  "Humanize.Parsing.Parse_RGB_Label"
]

[perf_smoke.text]
iterations = 2000
max_seconds = 10.0
paths = [
  "Humanize.Strings.Title_Case_Smart",
  "Humanize.Strings.Core.Title_Case_Smart",
  "Humanize.Strings.Truncate_Words",
  "Humanize.Strings.Display.Truncate_Display_Width",
  "Humanize.Colors.CSS.CSS_Color_Label"
]

[perf_smoke.domain]
iterations = 2000
max_seconds = 10.0
paths = [
  "Humanize.System_Status.HTTP_Status_Label",
  "Humanize.Operations.Progress_Summary",
  "Humanize.Diagnostics.Issue_Summary_Label",
  "Humanize.Search.Search_Result_Summary_Label",
  "Humanize.Capabilities.Capability_Matrix_Summary",
  "Humanize.Phrases.Status_Phrase",
  "Humanize.Phrases.Fields.Field_Change_Summary",
  "Humanize.Phrases.Keys.Status_Key",
  "Humanize.Phrases.Severity.Severity_Label",
  "Humanize.Phrases.Summaries.Queue_Summary",
  "Humanize.Builds.Build_Label",
  "Humanize.Permissions.Permission_Label",
  "Humanize.Domain_Details.Parse_Metadata_Summary_Label"
]

[perf_smoke.public_api_units]
Humanize_Bytes = "Humanize.Bytes.Format"
Humanize_Builds = "Humanize.Builds.Build_Label"
Humanize_Capabilities = "Humanize.Capabilities.Capability_Matrix_Summary"
Humanize_Colors = "Humanize.Colors.CSS.CSS_Color_Label"
Humanize_Colors_Contrast = "Humanize.Colors.Contrast.Contrast_Label"
