# Public API classification policy.
# Generated-maintained from `docs/PUBLIC_API.toml`.
# Class rows define the allowed public/internal categories;
# unit_class rows classify every public package in the allowlist.

[summary]
total_units = 98
primary_facades = 52
specialized_child_facades = 40
support_type_facades = 6

[[class]]
name = "primary-facade"
usecase = "Stable entry points callers are expected to import directly for normal formatting, parsing, context, and deterministic label work."
areas = ["root", "core", "formatting", "parsing", "phrases", "domain"]

[[class]]
name = "specialized-child-facade"
usecase = "Public child packages that keep large feature families navigable without exposing implementation packages."
prefixes = ["Humanize.Colors.", "Humanize.Durations.", "Humanize.Numbers.", "Humanize.Parsing.", "Humanize.Phrases.", "Humanize.Strings."]

[[class]]
name = "support-type-facade"
usecase = "Small public packages whose main purpose is shared result, style, metadata, bounded-output, or option types used by primary facades."
units = ["Humanize.Bounded_Text", "Humanize.Capabilities", "Humanize.Messages", "Humanize.Parsing.Results", "Humanize.Status", "Humanize.Styles"]

[[class]]
name = "internal"
usecase = "Implementation, support, generated-data, and tooling packages. These must remain absent from Library_Interface even when source specs exist."
forbidden_prefixes = ["Humanize.Catalogs.Core_Data", "Humanize.Catalogs.Native_Data", "Humanize.Catalogs.Unit_Data", "Humanize.Durations.Schedule_Data", "Humanize.I18N_Rendering", "Humanize.Parsing.Implementation", "Humanize.Phrases.Support", "Project_Tools"]

