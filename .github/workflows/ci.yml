name: ci

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  linux-release-check:
    name: Linux release checklist
    runs-on: ubuntu-latest
    steps:
      - name: Check out humanize
        uses: actions/checkout@v4
        with:
          path: humanize
      - name: Check out i18n sibling
        uses: actions/checkout@v4
        with:
          repository: ${{ github.repository_owner }}/i18n
          path: i18n
      - name: Check out project_tools sibling
        uses: actions/checkout@v4
        with:
          repository: ${{ github.repository_owner }}/project_tools
          path: project_tools
      - name: Set up Alire
        uses: alire-project/setup-alire@v5
      - name: Install Ada toolchain
        run: |
          sudo apt-get update
          sudo apt-get install -y gnat gprbuild gnatdoc
          sudo apt-get install -y libaunit-dev || sudo apt-get install -y libaunit22-dev || sudo apt-get install -y libaunit24-dev
      - name: Build release checker
        working-directory: humanize/check_humanize
        run: alr build
      - name: Run release checker
        working-directory: humanize/check_humanize
        run: ./bin/check_humanize
