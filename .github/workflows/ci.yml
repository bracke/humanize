name: ci

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  linux-release-check:
    name: Linux release checklist
    runs-on: ubuntu-latest
    steps:
      - name: Check out humanize
        uses: actions/checkout@v4
        with:
          path: humanize
      - name: Check out i18n sibling
        uses: actions/checkout@v4
        with:
          repository: ${{ github.repository_owner }}/i18n
          path: i18n
      - name: Check out project_tools sibling
        uses: actions/checkout@v4
        with:
          repository: ${{ github.repository_owner }}/project_tools
          path: project_tools
      - name: Set up Alire
        uses: alire-project/setup-alire@v5
        with:
          toolchain: gnat_native=15.2.1 gprbuild
      - name: Install GNATdoc
        # The release checker runs "alr exec -- gnatdoc". gnatdoc is a regular Alire
        # crate, not a toolchain component, and apt has no reliable gnatdoc package --
        # the previous "apt-get install gnatdoc" is what failed here.
        run: |
          alr install gnatdoc
          echo "$HOME/.alire/bin" >> "$GITHUB_PATH"
      - name: Build release checker
        working-directory: humanize/check_humanize
        run: alr --non-interactive build
      - name: Run release checker
        working-directory: humanize/check_humanize
        run: ./bin/check_humanize

  linux-staged-release:
    name: Linux staged release package
    runs-on: ubuntu-latest
    steps:
      - name: Check out humanize
        uses: actions/checkout@v4
        with:
          path: humanize
      - name: Check out i18n sibling
        uses: actions/checkout@v4
        with:
          repository: ${{ github.repository_owner }}/i18n
          path: i18n
      - name: Check out project_tools sibling
        uses: actions/checkout@v4
        with:
          repository: ${{ github.repository_owner }}/project_tools
          path: project_tools
      - name: Set up Alire
        uses: alire-project/setup-alire@v5
        with:
          toolchain: gnat_native=15.2.1 gprbuild
      - name: Install GNATdoc
        run: |
          alr install gnatdoc
          echo "$HOME/.alire/bin" >> "$GITHUB_PATH"
      - name: Build release checker
        working-directory: humanize/check_humanize
        run: alr --non-interactive build
      - name: Verify staged pin-free release tree
        working-directory: humanize/check_humanize
        run: ./bin/check_humanize --staged-release-only
